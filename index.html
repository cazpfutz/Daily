<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist Diário</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0;padding:20px;color:#222}
.card{max-width:700px;margin:auto;background:white;border-radius:20px;padding:20px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
h1{text-align:center}
.item{display:flex;gap:10px;padding:10px;border-bottom:1px solid #eee}
.time{width:70px;color:#666}
.progress{height:24px;background:#ddd;border-radius:20px;overflow:hidden;margin:15px 0}
.bar{height:100%;width:0;background:#4caf50;transition:.3s}
.buttons{display:flex;gap:10px}
button{flex:1;padding:12px;border:none;border-radius:12px;cursor:pointer}
.reset{background:#e74c3c;color:white}
</style>
</head>
<body>
<div class="card">
<h1>✅ Checklist Diário</h1>
<div id="list"></div>
<div class="progress"><div class="bar" id="bar"></div></div>
<p id="percent">0% concluído</p>
<div class="buttons">
<button class="reset" onclick="resetAll()">Limpar tudo</button>
</div>
</div>
<script>
const tasks=[
["06:45","⏰ Acordar"],["06:45","🪥 Escovar os dentes"],["06:55","👕 Vestir"],
["07:00","🐾 Limpar as caixas"],["07:10","👟 Correr/Academia/Outro"],
["08:10","🚿 Tomar banho"],["08:25","☕ Tomar café"],["08:45","🛏️ Arrumar a cama"],
["08:50","💻 Iniciar trabalho"],["","💧 Tomar água"],["12:00","↘️ Sair para o intervalo"],
["","🎮 Jogar/Rec"],["12:30","🔥 Fazer almoço"],["13:00","🍴 Almoçar"],
["13:15","🧼 Lavar a louça"],["13:35","↖️ Voltar à trabalhar"],
["15:00","🍀 Fazer chimarrão"],["16:00","🍪 Lanche da tarde"],
["18:30","🔽 Sair do trabalho"],["","❤️ Tempo de qualidade"],
["19:30","🛒 Ir no mercado"],["20:00","🔥 Fazer a Janta"],
["20:30","🍴 Jantar"],["21:00","🧼 Lavar a louça"],
["21:20","🧹 Varrer o chão"],["21:40","🚿 Tomar banho"],
["21:55","🛋️ Arrumar a sala"],["22:05","💤 Dormir"]
];
const list=document.getElementById("list");
tasks.forEach((t,i)=>{
list.innerHTML+=`<div class="item"><span class="time">${t[0]}</span><label><input type="checkbox" onchange="update()"> ${t[1]}</label></div>`;
});
function update(){
const total=document.querySelectorAll("input").length;
const done=document.querySelectorAll("input:checked").length;
const pct=Math.round(done/total*100);
document.getElementById("bar").style.width=pct+"%";
document.getElementById("percent").innerText=pct+"% concluído";
localStorage.setItem("checklist",JSON.stringify([...document.querySelectorAll("input")].map(x=>x.checked)));
}
function resetAll(){
document.querySelectorAll("input").forEach(x=>x.checked=false);
update();
}
const saved=JSON.parse(localStorage.getItem("checklist")||"[]");
document.querySelectorAll("input").forEach((x,i)=>x.checked=saved[i]||false);
update();
</script>
</body>
</html>
